<!DOCTYPE html>
<html>
<head><title>数据迁移</title></head>
<body style="font-family: sans-serif; padding: 50px; text-align: center;">
    <h2>正在迁移数据到云端数据库...</h2>
    <p id="status">连接中...</p>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://nblhviznjreijctriuuv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ibGh2aXpuanJlaWpjdHJpdXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTc0NDksImV4cCI6MjA4OTg3MzQ0OX0.Z6-AXKfksDjp8b36NrqjbAwV68vIsuujtv68xG-yWPE';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const foodsToMigrate = [
            { name: '鱼香肉丝', shop: '大厨家', rating: 7, taste: '不辣', review: '口感可以，味道可以，菜都爱吃', image_url: 'https://pic.huitu.com/pic/20240620/3609675_20240620111433689232_0.jpg' },
            { name: '水煮肉片', shop: '大厨家', rating: 5, taste: '微辣', review: '一般，有好吃的豆皮儿，但其他的味道也一般', image_url: 'https://pic.huitu.com/pic/20230613/3186103_20230613231117930205_0.jpg' },
            { name: '肉末外婆菜', shop: '大厨家', rating: 8, taste: '香辣', review: '口感很下饭，非常不错', image_url: 'https://pic.huitu.com/pic/20230328/940678_20230328232652800207_0.jpg' },
            { name: '腐竹烧肉', shop: '菜菜家', rating: 7, taste: '微辣', review: '口感还可以，很爱吃腐竹', image_url: 'https://pic.huitu.com/pic/20210219/1838314_20210219134128391070_0.jpg' },
            { name: '土豆牛肉', shop: '菜菜家', rating: 7, taste: '微辣', review: '口感还可以，挺喜欢土豆的', image_url: 'https://pic.huitu.com/pic/20230216/631790_20230216183642984228_0.jpg' },
            { name: '辣椒炒肉', shop: '菜菜家', rating: 5, taste: '微微辣', review: '辣椒不好吃，肉还可以', image_url: 'https://pic.huitu.com/pic/20210321/2597981_20210321231407237060_0.jpg' },
            { name: '藤椒肉丝', shop: '菜菜家', rating: 7, taste: '香辣', review: '肉的味道很不错，辣椒也不多，但辣椒不好吃', image_url: 'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=500&h=350&fit=crop' }
        ];

        async function migrate() {
            document.getElementById('status').textContent = '正在插入数据...';
            
            try {
                const { error } = await supabase.from('foods').insert(foodsToMigrate);
                
                if (error) {
                    if (error.message.includes('duplicate')) {
                        document.getElementById('status').innerHTML = '<h3 style="color: orange;">⚠️ 数据已存在</h3><p>数据库中已有数据，无需重复迁移</p><p><a href="index.html">点击打开美食网站 →</a></p>';
                    } else {
                        throw error;
                    }
                } else {
                    document.getElementById('status').innerHTML = '<h3 style="color: green;">✅ 迁移成功！</h3><p>已成功导入 7 道美食到云端数据库</p><p><a href="index.html">点击打开美食网站 →</a></p>';
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '<h3 style="color: red;">❌ 迁移失败</h3><p>' + error.message + '</p>';
            }
        }

        migrate();
    </script>
</body>
</html>
