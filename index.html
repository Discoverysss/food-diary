<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食品鉴录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #c7522a;
            --primary-dark: #a33f1c;
            --secondary: #f5b041;
            --accent: #e68a3d;
            --bg-cream: #fdf8f3;
            --text-dark: #2d2a26;
            --text-muted: #7a7067;
            --card-bg: #ffffff;
            --shadow-soft: 0 4px 20px rgba(199, 82, 42, 0.1);
            --shadow-hover: 0 12px 40px rgba(199, 82, 42, 0.2);
        }
        body {
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            background: var(--bg-cream);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(245, 176, 65, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(230, 138, 61, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(199, 82, 42, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 50%, #8b3a1a 100%);
            color: white;
            padding: 50px 20px 90px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 60px;
            background: var(--bg-cream);
            clip-path: ellipse(55% 100% at 50% 100%);
        }
        .header-content { position: relative; z-index: 1; }
        header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 3.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            animation: fadeInDown 0.8s ease;
        }
        header p {
            font-size: 1.2rem;
            opacity: 0.95;
            font-weight: 300;
            animation: fadeInUp 0.8s ease 0.2s both;
        }
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }
        .loading-spinner { font-size: 3rem; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .stats-container { max-width: 1100px; margin: -55px auto 30px; padding: 0 20px; position: relative; z-index: 10; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 35px;
            box-shadow: var(--shadow-soft);
            animation: fadeInUp 0.6s ease 0.3s both;
        }
        .stat-item { text-align: center; padding: 20px; position: relative; }
        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0; top: 50%;
            transform: translateY(-50%);
            height: 60px; width: 2px;
            background: linear-gradient(to bottom, transparent, #e8e0d8, transparent);
        }
        .stat-icon { font-size: 2.8rem; margin-bottom: 12px; }
        .stat-number {
            font-family: 'Noto Serif SC', serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { font-size: 1rem; color: var(--text-muted); margin-top: 8px; font-weight: 400; }
        .actions { display: flex; justify-content: center; gap: 15px; padding: 20px; flex-wrap: wrap; animation: fadeInUp 0.6s ease 0.4s both; }
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 6px 20px rgba(199, 82, 42, 0.35); }
        .btn-primary:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 10px 30px rgba(199, 82, 42, 0.45); }
        .filter-bar { display: flex; justify-content: center; gap: 12px; padding: 0 20px 25px; flex-wrap: wrap; animation: fadeInUp 0.6s ease 0.35s both; }
        .filter-btn {
            padding: 10px 22px;
            border: 2px solid #e8ddd4;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.35s ease;
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
        .filter-btn.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-color: var(--primary); color: white; box-shadow: 0 4px 15px rgba(199, 82, 42, 0.3); }
        .shop-stats { display: flex; justify-content: center; gap: 12px; max-width: 700px; margin: 0 auto 25px; padding: 0 20px; animation: fadeInUp 0.5s ease; }
        .shop-stat-card {
            background: white;
            border-radius: 16px;
            padding: 18px 20px;
            text-align: center;
            box-shadow: 0 3px 15px rgba(0,0,0,0.06);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }
        .shop-stat-card.active { border-color: var(--primary); background: linear-gradient(135deg, #fff8f5, #fff); }
        .shop-stat-icon { font-size: 1.5rem; margin-bottom: 6px; }
        .shop-stat-number { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .shop-stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 35px; padding: 10px 30px 80px; max-width: 1400px; margin: 0 auto; }
        .food-card {
            background: var(--card-bg);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardEnter 0.7s ease backwards;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        @keyframes cardEnter { from { opacity: 0; transform: translateY(50px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .food-card:hover { transform: translateY(-12px); box-shadow: var(--shadow-hover); }
        .food-image-wrap { position: relative; height: 240px; overflow: hidden; }
        .food-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease; }
        .food-card:hover .food-image { transform: scale(1.12); }
        .food-img-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.7) 100%); opacity: 0; transition: opacity 0.5s ease; }
        .food-card:hover .food-img-overlay { opacity: 1; }
        .food-rating-badge { position: absolute; top: 18px; right: 18px; background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; padding: 10px 20px; border-radius: 50px; font-weight: 700; font-size: 1.2rem; box-shadow: 0 6px 20px rgba(245, 176, 65, 0.5); z-index: 2; }
        .food-body { padding: 28px; flex: 1; }
        .food-name { font-family: 'Noto Serif SC', serif; font-size: 1.6rem; font-weight: 600; color: var(--text-dark); margin-bottom: 15px; position: relative; display: inline-block; }
        .food-name::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 50px; height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 3px; }
        .food-meta { display: flex; justify-content: space-between; align-items: center; margin: 25px 0 18px; }
        .food-date { font-size: 0.9rem; color: var(--text-muted); }
        .rating-pips { display: flex; gap: 4px; }
        .rating-pips span { width: 18px; height: 18px; border-radius: 5px; background: #ebe5de; transition: all 0.3s ease; }
        .rating-pips span.filled { background: linear-gradient(135deg, var(--secondary), var(--accent)); box-shadow: 0 2px 8px rgba(245, 176, 65, 0.4); }
        .food-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
        .food-taste { background: linear-gradient(135deg, #fff8f2, #ffe8d6); color: var(--primary); padding: 8px 16px; border-radius: 25px; font-size: 0.9rem; font-weight: 500; border: 1px solid rgba(199, 82, 42, 0.15); }
        .food-review { background: linear-gradient(135deg, #fefcf9, #f9f4ef); padding: 22px; border-radius: 18px; font-size: 1rem; color: var(--text-muted); line-height: 1.9; position: relative; border-left: 5px solid var(--primary); }
        .food-review::before { content: '"'; font-family: 'Noto Serif SC', serif; font-size: 4rem; color: var(--primary); opacity: 0.15; position: absolute; top: -5px; left: 18px; line-height: 1; }
        .food-actions { display: flex; justify-content: flex-end; gap: 12px; padding: 18px 28px; background: #fdfbf9; border-top: 2px dashed #f0ebe5; }
        .btn-sm { padding: 10px 20px; font-size: 0.9rem; border-radius: 25px; }
        .btn-edit { background: rgba(199, 82, 42, 0.1); color: var(--primary); border: none; }
        .btn-edit:hover { background: var(--primary); color: white; }
        .btn-del { background: rgba(220, 53, 69, 0.1); color: #dc3545; border: none; }
        .btn-del:hover { background: #dc3545; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(45, 42, 38, 0.75); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 32px; padding: 42px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 30px 80px rgba(0,0,0,0.35); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.88) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 22px; border-bottom: 3px solid #f5efe8; }
        .modal-header h2 { font-family: 'Noto Serif SC', serif; color: var(--primary); font-size: 1.9rem; font-weight: 600; }
        .modal-close { background: #f5efe8; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.4rem; color: var(--text-muted); transition: all 0.35s ease; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--primary); color: white; transform: rotate(90deg) scale(1.1); }
        .form-group { margin-bottom: 26px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 500; color: var(--text-dark); font-size: 1.05rem; }
        .form-group label span { color: var(--primary); }
        .form-group input, .form-group textarea { width: 100%; padding: 16px 22px; border: 2px solid #eee; border-radius: 16px; font-size: 1.05rem; transition: all 0.3s ease; font-family: inherit; background: #faf7f3; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 5px rgba(199, 82, 42, 0.1); }
        .form-group textarea { min-height: 130px; resize: vertical; }
        .rating-input { display: flex; gap: 12px; flex-wrap: wrap; }
        .rating-btn { width: 50px; height: 50px; border: 2px solid #eee; border-radius: 14px; background: white; cursor: pointer; font-size: 1.15rem; font-weight: 600; color: var(--text-muted); transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .rating-btn:hover { transform: scale(1.15) rotate(5deg); border-color: var(--secondary); color: var(--secondary); }
        .rating-btn.selected { background: linear-gradient(135deg, var(--secondary), var(--accent)); border-color: var(--secondary); color: white; transform: scale(1.15); box-shadow: 0 6px 20px rgba(245, 176, 65, 0.5); }
        .form-actions { display: flex; gap: 16px; margin-top: 32px; }
        .form-actions .btn { flex: 1; justify-content: center; }
        .empty-state { text-align: center; padding: 100px 20px; color: var(--text-muted); grid-column: 1 / -1; }
        .empty-state-icon { font-size: 6rem; margin-bottom: 30px; animation: float 2.5s ease-in-out infinite; }
        .empty-state h3 { font-family: 'Noto Serif SC', serif; font-size: 1.6rem; margin-bottom: 12px; color: var(--text-dark); }
        .empty-state p { font-size: 1.15rem; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(8deg); } }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--primary), var(--accent)); border-radius: 5px; }
        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            header { padding: 35px 20px 70px; }
            .stats-container { margin-top: -45px; }
            .stats { grid-template-columns: 1fr; gap: 12px; padding: 22px; }
            .stat-item:not(:last-child)::after { display: none; }
            .stat-item { border-bottom: 1px solid #eee; padding-bottom: 18px; }
            .stat-item:last-child { border-bottom: none; }
            .stat-number { font-size: 2.4rem; }
            .food-grid { grid-template-columns: 1fr; padding: 15px 18px 50px; gap: 25px; }
            .actions { padding: 25px 15px; }
            .btn { padding: 12px 22px; font-size: 0.95rem; }
            .modal-content { padding: 28px; border-radius: 24px; }
            .rating-btn { width: 44px; height: 44px; }
            .shop-stats { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🍽️ 美食品鉴录</h1>
            <p>记录每一道令人难忘的美味时刻</p>
        </div>
    </header>

    <div id="loading" class="loading">
        <div class="loading-spinner">⏳</div>
        <p style="margin-top: 20px;">正在连接数据库...</p>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="stats-container">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-icon">🍴</div>
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">美食记录</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-number" id="avgRating">0</div>
                    <div class="stat-label">平均评分</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-number" id="topRating">0</div>
                    <div class="stat-label">最高评分</div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="openAddModal()"><span>✨</span> 添加美食</button>
        </div>

        <div class="filter-bar" id="filterBar"></div>
        <div class="shop-stats" id="shopStats"></div>
        <div class="food-grid" id="foodGrid"></div>
    </div>

    <div class="modal" id="foodModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">✨ 添加美食</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="foodForm" onsubmit="saveFood(event)">
                <input type="hidden" id="foodId">
                <div class="form-group">
                    <label>美食名称 <span>*</span></label>
                    <input type="text" id="foodName" required placeholder="例如：红烧肉、川菜、粤式点心...">
                </div>
                <div class="form-group">
                    <label>店铺名称</label>
                    <input type="text" id="foodShop" placeholder="例如：外婆家、麦当劳...">
                </div>
                <div class="form-group">
                    <label>评分 (1-10分) <span>*</span></label>
                    <div class="rating-input" id="ratingInput"></div>
                </div>
                <div class="form-group">
                    <label>味道特点</label>
                    <input type="text" id="foodTaste" placeholder="例如：香辣、甜而不腻...">
                </div>
                <div class="form-group">
                    <label>品尝感受</label>
                    <textarea id="foodReview" placeholder="记录这道美食的口感、味道..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content" style="max-width: 420px;">
            <div class="modal-header">
                <h2>⚠️ 确认删除</h2>
                <button class="modal-close" onclick="closeDeleteModal()">×</button>
            </div>
            <p style="text-align: center; padding: 28px 0; color: var(--text-muted); font-size: 1.1rem; line-height: 1.9;">
                确定要删除<br><strong id="deleteFoodName" style="color: var(--text-dark); font-size: 1.2rem;"></strong><br>
                <small style="color: #aaa;">删除后数据将无法恢复</small>
            </p>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
                <button class="btn" style="background: #dc3545; color: white;" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://nblhviznjreijctriuuv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ibGh2aXpuanJlaWpjdHJpdXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTc0NDksImV4cCI6MjA4OTg3MzQ0OX0.Z6-AXKfksDjp8b36NrqjbAwV68vIsuujtv68xG-yWPE';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let foods = [];
        let selectedRating = 0;
        let deleteFoodId = null;
        let currentFilter = '全部';

        async function loadData() {
            try {
                const { data, error } = await supabase
                    .from('foods')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                foods = data || [];
                updateStats();
                renderFilterBar();
                renderShopStats();
                renderFoods();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('加载数据失败，请刷新重试');
            }
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = foods.length;
            if (foods.length > 0) {
                const avg = (foods.reduce((sum, f) => sum + f.rating, 0) / foods.length).toFixed(1);
                const max = Math.max(...foods.map(f => f.rating));
                document.getElementById('avgRating').textContent = avg;
                document.getElementById('topRating').textContent = max;
            } else {
                document.getElementById('avgRating').textContent = '0';
                document.getElementById('topRating').textContent = '0';
            }
        }

        function initRatingInput() {
            const container = document.getElementById('ratingInput');
            container.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'rating-btn';
                btn.textContent = i;
                btn.onclick = () => selectRating(i);
                container.appendChild(btn);
            }
        }

        function selectRating(rating) {
            selectedRating = rating;
            document.querySelectorAll('.rating-btn').forEach((btn, index) => {
                btn.classList.toggle('selected', index < rating);
            });
        }

        function renderFilterBar() {
            const shops = [...new Set(foods.filter(f => f.shop).map(f => f.shop))];
            const filterBar = document.getElementById('filterBar');
            
            let html = `<button class="filter-btn ${currentFilter === '全部' ? 'active' : ''}" data-filter="全部">🏠 全部</button>`;
            shops.forEach(shop => {
                html += `<button class="filter-btn ${currentFilter === shop ? 'active' : ''}" data-filter="${shop}">🏪 ${shop}</button>`;
            });
            filterBar.innerHTML = html;
            
            // 使用事件委托
            filterBar.onclick = (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    const filter = e.target.dataset.filter;
                    setFilter(filter);
                }
            };
        }

        function renderShopStats() {
            const shopStats = document.getElementById('shopStats');
            if (currentFilter === '全部') {
                shopStats.innerHTML = '';
                return;
            }
            const shopFoods = foods.filter(f => f.shop === currentFilter);
            const count = shopFoods.length;
            const avgRating = count > 0 ? (shopFoods.reduce((sum, f) => sum + f.rating, 0) / count).toFixed(1) : 0;
            const maxRating = count > 0 ? Math.max(...shopFoods.map(f => f.rating)) : 0;
            const minRating = count > 0 ? Math.min(...shopFoods.map(f => f.rating)) : 0;
            shopStats.innerHTML = `
                <div class="shop-stat-card active"><div class="shop-stat-icon">🍽️</div><div class="shop-stat-number">${count}</div><div class="shop-stat-label">美食数量</div></div>
                <div class="shop-stat-card active"><div class="shop-stat-icon">⭐</div><div class="shop-stat-number">${avgRating}</div><div class="shop-stat-label">平均评分</div></div>
                <div class="shop-stat-card active"><div class="shop-stat-icon">🏆</div><div class="shop-stat-number">${maxRating}</div><div class="shop-stat-label">最高评分</div></div>
                <div class="shop-stat-card active"><div class="shop-stat-icon">📉</div><div class="shop-stat-number">${minRating}</div><div class="shop-stat-label">最低评分</div></div>
            `;
        }

        function setFilter(filter) {
            currentFilter = filter;
            renderFilterBar();
            renderShopStats();
            renderFoods();
        }

        function renderFoods() {
            const filteredFoods = currentFilter === '全部' ? foods : foods.filter(f => f.shop === currentFilter);
            const grid = document.getElementById('foodGrid');
            
            if (filteredFoods.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🍽️</div><h3>${currentFilter === '全部' ? '还没有美食记录' : '此店铺暂无记录'}</h3><p>${currentFilter === '全部' ? '点击"添加美食"开始记录' : '选择其他店铺查看'}</p></div>`;
                return;
            }

            grid.innerHTML = filteredFoods.map(food => `
                <div class="food-card">
                    <div class="food-image-wrap">
                        <img class="food-image" src="${food.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&h=350&fit=crop'}" alt="${food.name}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&h=350&fit=crop'">
                        <div class="food-img-overlay"></div>
                        <div class="food-rating-badge">⭐ ${food.rating}</div>
                    </div>
                    <div class="food-body">
                        <h3 class="food-name">${food.name}</h3>
                        ${food.shop ? `<div class="food-tags" style="margin-top: 8px;"><span class="food-taste">🏪 ${food.shop}</span></div>` : ''}
                        <div class="food-meta">
                            <span class="food-date">📅 ${formatDate(food.created_at)}</span>
                            <div class="rating-pips">${renderPips(food.rating)}</div>
                        </div>
                        ${food.taste ? `<div class="food-tags"><span class="food-taste">🍴 ${food.taste}</span></div>` : ''}
                        ${food.review ? `<div class="food-review">${food.review}</div>` : ''}
                    </div>
                    <div class="food-actions">
                        <button class="btn btn-edit btn-sm" onclick="openEditModal('${food.id}')">✏️ 编辑</button>
                        <button class="btn btn-del btn-sm" onclick="openDeleteModal('${food.id}')">🗑️ 删除</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPips(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += `<span class="${i <= Math.floor(rating / 2) ? 'filled' : ''}"></span>`;
            }
            return html;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = '✨ 添加美食';
            document.getElementById('foodForm').reset();
            document.getElementById('foodId').value = '';
            selectedRating = 0;
            selectRating(0);
            document.getElementById('foodModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function openEditModal(id) {
            const food = foods.find(f => f.id == id);
            if (!food) return;
            document.getElementById('modalTitle').textContent = '✏️ 编辑美食';
            document.getElementById('foodId').value = food.id;
            document.getElementById('foodName').value = food.name;
            document.getElementById('foodShop').value = food.shop || '';
            document.getElementById('foodTaste').value = food.taste || '';
            document.getElementById('foodReview').value = food.review || '';
            selectedRating = food.rating;
            selectRating(selectedRating);
            document.getElementById('foodModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('foodModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        async function saveFood(event) {
            event.preventDefault();
            const name = document.getElementById('foodName').value.trim();
            const shop = document.getElementById('foodShop').value.trim();
            const taste = document.getElementById('foodTaste').value.trim();
            const review = document.getElementById('foodReview').value.trim();
            const id = document.getElementById('foodId').value;

            if (!name || selectedRating === 0) { alert('请填写完整信息'); return; }

            const btn = document.getElementById('submitBtn');
            btn.textContent = '保存中...';
            btn.disabled = true;

            try {
                const foodData = { name, shop: shop || null, rating: selectedRating, taste: taste || null, review: review || null };

                if (id) {
                    const { error } = await supabase.from('foods').update({ ...foodData, updated_at: new Date().toISOString() }).eq('id', id);
                    if (error) throw error;
                } else {
                    const { error } = await supabase.from('foods').insert([foodData]);
                    if (error) throw error;
                }

                await loadData();
                closeModal();
            } catch (error) {
                alert('保存失败: ' + error.message);
            } finally {
                btn.textContent = '保存';
                btn.disabled = false;
            }
        }

        function openDeleteModal(id) {
            const food = foods.find(f => f.id == id);
            if (!food) return;
            deleteFoodId = id;
            document.getElementById('deleteFoodName').textContent = food.name;
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteFoodId = null;
        }

        async function confirmDelete() {
            if (!deleteFoodId) return;
            try {
                const { error } = await supabase.from('foods').delete().eq('id', deleteFoodId);
                if (error) throw error;
                await loadData();
                closeDeleteModal();
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        // 把函数暴露到全局，让 onclick 能调用
        window.openAddModal = openAddModal;
        window.openEditModal = openEditModal;
        window.closeModal = closeModal;
        window.openDeleteModal = openDeleteModal;
        window.closeDeleteModal = closeDeleteModal;
        window.confirmDelete = confirmDelete;
        window.saveFood = saveFood;
        window.setFilter = setFilter;

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            initRatingInput();
            loadData();
        });
    </script>
